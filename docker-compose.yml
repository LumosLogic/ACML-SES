version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: recruitx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recruitx
      POSTGRES_USER: recruitx
      POSTGRES_PASSWORD: recruitx123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
